<!DOCTYPE html>
<html>
<head>
  <title>Crafting Gamble</title>
  <link rel="icon" type="image/png" href="textures/iron.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.cdnfonts.com/css/minecraft-3" rel="stylesheet">
  <style>
    body {
      font-family: 'Minecraft', sans-serif;
    }
  </style>
</head>
<body>

<h1>Crafting Gamble</h1>

<div class="container">

  <div id="grid">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
  </div>

  <div class="arrow">
    ➜
  </div>

  <div class="preview">
    <div id="resultBox">
      <img id="resultImg" src="">
    </div>
  </div>

  <div class="sidebar">
    <div id="diamonds"><img src="textures/diamond.png" style="width:20px;"> 100</div>
    <div class="buy-section">
      <input type="number" id="ticketAmount" min="1" value="1">
      <button id="buyTicketBtn">Buy Tickets</button>
    </div>

    <button id="cashoutBtn" disabled>Cashout</button>
    <button id="homeBtn" >Home</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
