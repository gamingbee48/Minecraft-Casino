<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft Fishing Gambler | Cast & Catch Legendary Loot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="minecraft-panel">
            <canvas id="gameCanvas" width="800" height="450"></canvas>

            <div class="stats-bar">
                <div class="stat-card">
                    <span class="stat-icon">💎</span>
                    <span id="diamondAmount">1000</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🎣</span>
                    <span>Best: <span id="bestCatchName">—</span> <span id="bestCatchValue">0</span>x</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🏆</span>
                    <span>Total Fish: <span id="totalFish">0</span></span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">✨</span>
                    <span>Rare: <span id="rareCatches">0</span></span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">💰</span>
                    <span>Win: <span id="totalWinnings">0</span></span>
                </div>
            </div>

            <div class="controls-row">
                <div class="bet-area">
                    <span class="bet-label">🎲 Bet:</span>
                    <button id="betDown" class="btn-small">-</button>
                    <span id="betValue" class="bet-value">10</span>
                    <button id="betUp" class="btn-small">+</button>
                </div>
                
                <div class="weather-time">
                    <div class="weather-icon" id="weatherIcon">☀️</div>
                    <div class="time-icon" id="timeIcon">🌞</div>
                </div>
                
                <div class="durability-area">
                    <span>🎣 Durability</span>
                    <div class="rod-durability">
                        <div id="durabilityFill" class="durability-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="power-bar-container">
                <div class="power-bar">
                    <div id="powerFill" class="power-fill"></div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="resetStatsBtn" class="btn-primary">📜 Reset Stats</button>
                <button id="soundToggleBtn" class="btn-primary">🔊 Sound ON</button>
            </div>
            
            <div class="instruction">
                💡 [HOLD] on water to cast → power bar fills → release to fish!
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
