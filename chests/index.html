<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Case Opening</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Minecraft Case Opening</h1>

<div id="topBar">
    <button id="homeBtn">Home</button>
    <div id="diamondDisplay">💎 Diamonds: <span id="diamondCount">200</span></div>
</div>

<!-- Chest -->
<div id="chestScreen">
    <img id="chestImg" src="textures/chest.png">
</div>

<!-- Spinner -->
<div id="spinnerSection" class="hidden">
    <div id="spinnerContainer">
        <div id="marker"></div>
        <div id="spinner"></div>
    </div>
</div>

<div id="caseSection">
    <button id="openBtn">Open Blacksmith Chest (25💎)</button>
</div>

<div id="resultBox">
    <h2>Result</h2>
    <p id="resultText">Open a chest!</p>
</div>

<script src="script.js"></script>
</body>
</html>
